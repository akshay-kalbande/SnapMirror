name: snapmirror
description: "A social media app, built with Flutter and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_storage: ^13.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.3
  image_picker: ^1.2.1
  intl: ^0.20.2
  uuid: ^4.5.2
  provider: ^6.1.5+1
  cached_network_image: ^3.4.1
  freezed_annotation: ^3.1.0
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  get_it: ^9.2.0
  equatable: ^2.0.7
  flutter_local_notifications: ^19.5.0
  firebase_messaging: ^16.1.0
  bloc_concurrency: ^0.3.0
  go_router: ^17.0.1
  hydrated_bloc: ^10.1.1
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  formz: ^0.8.0
  dropdown_search: ^6.0.2
  pointer_interceptor: ^0.10.1+2
  stream_transform: ^2.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  build_runner: ^2.10.4
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true
  assets:
     - assets/images/
